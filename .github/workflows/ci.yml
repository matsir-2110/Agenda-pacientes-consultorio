name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    # INSTALAMOS PNPM EN EL SERVIDOR
    - uses: pnpm/action-setup@v2
      with:
        version: 8

    - run: pnpm install
    - run: pnpm vitest run